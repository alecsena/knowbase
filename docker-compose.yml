version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    networks:
      - kms-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - kms-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kms-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - kms-network

  backend:
    build:
      context: ./backend
    ports:
      - "8020:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.kms-api-http.rule=Host(`kms.dataverse.com.br`) && (Path(`/api`) || PathPrefix(`/api/`))
      - traefik.http.routers.kms-api-http.entrypoints=http
      - traefik.http.routers.kms-api-http.middlewares=redirect-to-https
      - traefik.http.routers.kms-api-http.priority=100
      - traefik.http.routers.kms-api-https.rule=Host(`kms.dataverse.com.br`) && (Path(`/api`) || PathPrefix(`/api/`))
      - traefik.http.routers.kms-api-https.entrypoints=https
      - traefik.http.routers.kms-api-https.tls=true
      - traefik.http.routers.kms-api-https.tls.certresolver=letsencrypt
      - traefik.http.routers.kms-api-https.priority=100
      - traefik.http.services.kms-api.loadbalancer.server.port=8000
    environment:
      - MONGODB_URL=mongodb://admin:password@mongo:27017
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      mongo:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - kms-network
      - easypanel

  worker:
    build:
      context: ./backend
    command: celery -A app.core.celery_app worker --loglevel=info --queues=documents.conversion,main-queue
    environment:
      - MONGODB_URL=mongodb://admin:password@mongo:27017
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - QDRANT_URL=http://qdrant:6333
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      mongo:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - kms-network

  # flower:
  #   build:
  #     context: ./backend
  #   command: celery -A app.core.celery_app flower --port=5555
  #   ports:
  #     - "5555:5555"
  #   environment:
  #     - MONGODB_URL=mongodb://admin:password@mongo:27017
  #     - MINIO_ENDPOINT=minio:9000
  #     - MINIO_ACCESS_KEY=minioadmin
  #     - MINIO_SECRET_KEY=minioadmin
  #     - QDRANT_URL=http://qdrant:6333
  #     - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/1
  #   depends_on:
  #     redis:
  #       condition: service_started
  #     rabbitmq:
  #       condition: service_healthy
  #     worker:
  #       condition: service_started
  #   networks:
  #     - kms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3020:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.kms-web-http.rule=Host(`kms.dataverse.com.br`) && !Path(`/api`) && !PathPrefix(`/api/`)
      - traefik.http.routers.kms-web-http.entrypoints=http
      - traefik.http.routers.kms-web-http.middlewares=redirect-to-https
      - traefik.http.routers.kms-web-http.priority=10
      - traefik.http.routers.kms-web-https.rule=Host(`kms.dataverse.com.br`) && !Path(`/api`) && !PathPrefix(`/api/`)
      - traefik.http.routers.kms-web-https.entrypoints=https
      - traefik.http.routers.kms-web-https.tls=true
      - traefik.http.routers.kms-web-https.tls.certresolver=letsencrypt
      - traefik.http.routers.kms-web-https.priority=10
      - traefik.http.services.kms-web.loadbalancer.server.port=3000
    environment:
      - NEXT_PUBLIC_API_URL=https://kms.dataverse.com.br
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kms-network
      - easypanel

networks:
  kms-network:
    driver: bridge
  easypanel:
    external: true

volumes:
  mongo_data:
  minio_data:
  rabbitmq_data:
