      parameters:
        - name: group_id
          in: query
          schema:
            type: integer
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Relatório
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalWorkflowReport'
        '403':
          $ref: '#/components/responses/Forbidden'
          
  /reports/documents:
    get:
      tags:
        - Relatórios
      summary: Relatório de documentos
      operationId: getDocumentsReport
      parameters:
        - name: group_id
          in: query
          schema:
            type: integer
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Relatório
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentsReport'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==================== BUSCA ====================
  /search:
    get:
      tags:
        - Busca
      summary: Busca global
      description: Busca em documentos respeitando permissões
      operationId: searchDocuments
      parameters:
        - name: q
          in: query
          required: true
          description: Termo de busca
          schema:
            type: string
        - name: group_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: integer
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: created_after
          in: query
          schema:
            type: string
            format: date
        - name: created_before
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Resultados da busca
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'

  # ==================== UPLOAD ====================
  /upload/image:
    post:
      tags:
        - Upload
      summary: Upload de imagem
      description: Upload de imagem para uso em documentos
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - document_id
              properties:
                file:
                  type: string
                  format: binary
                document_id:
                  type: integer
      responses:
        '201':
          description: Imagem enviada
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  filename:
                    type: string
                  size:
                    type: integer
                  mime_type:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtido via /auth/login
      
  parameters:
    Page:
      name: page
      in: query
      description: Número da página
      schema:
        type: integer
        minimum: 1
        default: 1
        
    PerPage:
      name: per_page
      in: query
      description: Itens por página
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
        
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
        
    GroupId:
      name: group_id
      in: path
      required: true
      schema:
        type: integer
        
    FolderId:
      name: folder_id
      in: path
      required: true
      schema:
        type: integer
        
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: integer
        
    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: integer
        
    CommentId:
      name: comment_id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    # ========== Schemas de Usuário ==========
    UserCreate:
      type: object
      required:
        - full_name
        - email
        - password
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        phone:
          type: string
          nullable: true
        job_title:
          type: string
          nullable: true
          
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string
          nullable: true
        job_title:
          type: string
          nullable: true
          
    User:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        job_title:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
          
    UserDetail:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            groups:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
            stats:
              type: object
              properties:
                documents_created:
                  type: integer
                comments_added:
                  type: integer
                documents_reviewed:
                  type: integer
                  
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            groups:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
            notification_preferences:
              $ref: '#/components/schemas/NotificationPreferences'
              
    UserReference:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
          nullable: true
          
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 86400
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
            groups:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string

    # ========== Schemas de Grupo ==========
    GroupCreate:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
        description:
          type: string
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
          example: '#3B82F6'
        icon:
          type: string
          example: laptop
          
    GroupUpdate:
      $ref: '#/components/schemas/GroupCreate'
      
    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        color:
          type: string
        icon:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/UserReference'
          
    GroupListItem:
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          properties:
            my_roles:
              type: array
              items:
                type: string
            stats:
              type: object
              properties:
                members_count:
                  type: integer
                documents_count:
                  type: integer
                folders_count:
                  type: integer
                  
    GroupDetail:
      allOf:
        - $ref: '#/components/schemas/Group'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/GroupMember'
            stats:
              type: object
              properties:
                members_count:
                  type: integer
                documents_count:
                  type: integer
                published_count:
                  type: integer
                pending_approval_count:
                  type: integer
                folders_count:
                  type: integer
                  
    GroupMember:
      type: object
      properties:
        user_id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [admin_grupo, revisor, editor, reader]
        added_at:
          type: string
          format: date-time
        added_by:
          $ref: '#/components/schemas/UserReference'

    # ========== Schemas de Pasta ==========
    FolderCreate:
      type: object
      required:
        - name
        - group_id
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        group_id:
          type: integer
        parent_folder_id:
          type: integer
          nullable: true
          
    FolderUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
          
    Folder:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        group_id:
          type: integer
        parent_folder_id:
          type: integer
          nullable: true
        path:
          type: string
          example: /Políticas/RH
        level:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/UserReference'
          
    FolderDetail:
      allOf:
        - $ref: '#/components/schemas/Folder'
        - type: object
          properties:
            breadcrumb:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
            documents_count:
              type: integer
            subfolders_count:
              type: integer
              
    FolderTree:
      allOf:
        - $ref: '#/components/schemas/Folder'
        - type: object
          properties:
            documents_count:
              type: integer
            children:
              type: array
              items:
                $ref: '#/components/schemas/FolderTree'

    # ========== Schemas de Documento ==========
    DocumentCreate:
      type: object
      required:
        - title
        - group_id
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          nullable: true
        group_id:
          type: integer
        folder_id:
          type: integer
          nullable: true
        category_id:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
          maxItems: 20
          
    DocumentUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category_id:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
            
    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [draft, new, processing, pending_approval, approved, published, changes_requested, archived, deprecated]
        group_id:
          type: integer
        folder_id:
          type: integer
          nullable: true
        category_id:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        content:
          type: string
          nullable: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/UserReference'
        updated_at:
          type: string
          format: date-time
          nullable: true
        updated_by:
          $ref: '#/components/schemas/UserReference'
          nullable: true
          
    DocumentListItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        group:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        folder:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            path:
              type: string
        category:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        tags:
          type: array
          items:
            type: string
        version:
          type: integer
        created_by:
          $ref: '#/components/schemas/UserReference'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
        unresolved_comments_count:
          type: integer
          
    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/Document'
        - type: object
          properties:
            group:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                color:
                  type: string
            folder:
              type: object
              nullable: true
              properties:
                id:
                  type: integer
                name:
                  type: string
                path:
                  type: string
            category:
              type: object
              nullable: true
              properties:
                id:
                  type: integer
                name:
                  type: string
            related_documents:
              type: array
              items:
                $ref: '#/components/schemas/DocumentReference'
            locked_by:
              $ref: '#/components/schemas/UserReference'
              nullable: true
            locked_at:
              type: string
              format: date-time
              nullable: true
            published_at:
              type: string
              format: date-time
              nullable: true
            stats:
              type: object
              properties:
                views_count:
                  type: integer
                comments_count:
                  type: integer
                unresolved_comments_count:
                  type: integer
                  
    DocumentReference:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
          
    DocumentLock:
      type: object
      properties:
        locked:
          type: boolean
        locked_by:
          $ref: '#/components/schemas/UserReference'
        locked_at:
          type: string
          format: date-time
        lock_expires_at:
          type: string
          format: date-time
          
    PendingDocument:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          $ref: '#/components/schemas/UserReference'
        group:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        folder:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        submitted_at:
          type: string
          format: date-time
        submitted_by:
          $ref: '#/components/schemas/UserReference'
        reviewer_message:
          type: string
          nullable: true
        unresolved_comments_count:
          type: integer
        days_pending:
          type: integer

    # ========== Schemas de Template ==========
    TemplateCreate:
      type: object
      required:
        - name
        - content
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        content:
          type: string
        default_tags:
          type: array
          items:
            type: string
        default_category_id:
          type: integer
          nullable: true
          
    TemplateUpdate:
      $ref: '#/components/schemas/TemplateCreate'
      
    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        content:
          type: string
        default_tags:
          type: array
          items:
            type: string
        default_category_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/UserReference'
        updated_at:
          type: string
          format: date-time
          nullable: true
          
    TemplateListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        preview:
          type: string
          description: Primeiros 200 caracteres do conteúdo
        usage_count:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by:
          $ref: '#/components/schemas/UserReference'

    # ========== Schemas de Comentário ==========
    CommentCreate:
