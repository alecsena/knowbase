        - text
      properties:
        text:
          type: string
          minLength: 3
          maxLength: 2000
        start_offset:
          type: integer
          nullable: true
        end_offset:
          type: integer
          nullable: true
        selected_text:
          type: string
          nullable: true
        context_before:
          type: string
          maxLength: 100
          nullable: true
        context_after:
          type: string
          maxLength: 100
          nullable: true
        is_critical:
          type: boolean
          default: false
        is_general:
          type: boolean
          default: false
        mentioned_user_ids:
          type: array
          items:
            type: integer
            
    Comment:
      type: object
      properties:
        id:
          type: integer
        document_id:
          type: integer
        text:
          type: string
        start_offset:
          type: integer
          nullable: true
        end_offset:
          type: integer
          nullable: true
        selected_text:
          type: string
          nullable: true
        is_critical:
          type: boolean
        is_general:
          type: boolean
        resolved:
          type: boolean
        created_by:
          $ref: '#/components/schemas/UserReference'
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          $ref: '#/components/schemas/UserReference'
          nullable: true
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/UserReference'
            
    CommentDetail:
      allOf:
        - $ref: '#/components/schemas/Comment'
