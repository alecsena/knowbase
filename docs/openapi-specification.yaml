  # ==================== CONVERSÃO ====================
  /documents/upload:
    post:
      tags:
        - Conversão
      summary: Upload de arquivo para conversão
      description: Faz upload de arquivo para conversão em Markdown
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - title
                - group_id
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo a ser convertido (PDF, DOCX, etc.)
                title:
                  type: string
                group_id:
                  type: integer
                folder_id:
                  type: integer
                category_id:
                  type: integer
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Upload bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Arquivo inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_file
                  message:
                    type: string
                  supported_types:
                    type: array
                    items:
                      type: string
        '413':
          description: Arquivo muito grande
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: file_too_large
                  message:
                    type: string
                  max_size_bytes:
                    type: integer
                    example: 104857600
        '403':
          $ref: '#/components/responses/Forbidden'
          
  /documents/{document_id}/status-stream:
    get:
      tags:
        - Conversão
      summary: Status stream de conversão (SSE)
      description: Stream de eventos de conversão em tempo real
      operationId: getConversionStatusStream
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: status_update
                  data: {"status": "processing", "progress": 50, "message": "Convertendo páginas..."}
                  
                  event: heartbeat
                  data: {"timestamp": "2024-01-17T10:31:00Z"}
                  
                  event: status_update
                  data: {"status": "draft", "progress": 100, "message": "Conversão concluída!"}
        '403':
          $ref: '#/components/responses/Forbidden'
          
  /documents/{document_id}/retry-conversion:
    post:
      tags:
        - Conversão
      summary: Re-upload após falha
      description: Reinicia conversão com novo arquivo após falha
      operationId: retryConversion
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Nova tentativa iniciada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                    example: processing
                  celery_task_id:
                    type: string
                    format: uuid
                  conversion_attempts:
                    type: integer
                  message:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
          
